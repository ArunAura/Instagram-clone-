<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <title>Instagram-Clone</title>
  </head>
  <body>
    <div class="container">
      <div class="left-container">
        <div class="logo">
          <img class="logo-img"
            src="images/instagramlogo.png"
            alt="instagram"
            width="540px"
            height="600px"
          />
        </div>
      </div>
      <div class="right-container">
        <div class="login-form">
          <h2 style="color: white">Log into instagram</h2>
          <input
            type="text"
            name="username"
            placeholder="mobile number username or email"
            rows="1"
            cols="50"
          />
          <input
            type="password"
            name="password"
            placeholder="password"
            rows="1"
            cols="50"
          />
          <button class="submit">Log in</button>
          <button class="forgot">Forgot password?</button>
          <div class="others">
            <button class="facebook">Log in with Facebook</button>
            <button class="new">Create a new account</button>
          </div>
        </div>
      </div>
    </div>
    
  <hr>

        >Contact Uploading & Non-Users</a

    </div>
  </body>
</html>
